name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  package-runtime-artifact:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build runtime bundle
        run: |
          mkdir -p release
          tar -czf release/pdf-to-podcast-runtime.tar.gz \
            setup.sh \
            docker-compose.yaml \
            requirements.txt \
            models.json \
            frontend \
            services \
            shared \
            .env.example

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-to-podcast-runtime
          path: release/pdf-to-podcast-runtime.tar.gz
