name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e shared/

      - name: Ruff check
        run: |
          python -m ruff check frontend services shared

      - name: Python syntax check
        run: |
          python -m compileall frontend services shared

      - name: Validate setup script syntax (Linux)
        if: runner.os == 'Linux'
        run: |
          bash -n setup.sh

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose file
        run: |
          docker compose -f docker-compose.yaml config > /dev/null
